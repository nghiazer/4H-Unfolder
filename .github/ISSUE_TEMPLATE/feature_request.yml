name: 💡 Feature request
description: Suggest an idea or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please check the
        [Roadmap](https://github.com/nghiazer/4H-Unfolder/wiki/Roadmap) and
        [existing issues](https://github.com/nghiazer/4H-Unfolder/issues) first —
        it may already be planned or requested.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or the frustration. "As a papercrafter, I want… so that…"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen? How would it work in the app?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you use today, or other approaches you thought about.
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Which platform(s)?
      multiple: true
      options:
        - Windows
        - macOS
        - Both
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and the Roadmap, and this isn't already covered.
          required: true
